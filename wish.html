<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-en="AHI6Ra7eRY6TiQk4MwM0CA==">/title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .grid-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    #particles-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 1; pointer-events: none;
    }

    .scanlines {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 2; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
    }

    .crt-vignette {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 3; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.8) 100%);
    }

    .scan-beam {
      position: fixed; top: 0; left: 0; width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      z-index: 4; pointer-events: none;
      animation: scanBeam 7s linear infinite; opacity: 0.5;
    }

    @keyframes scanBeam {
      0% { top: -2px; }
      100% { top: 100vh; }
    }

    .data-stream {
      position: fixed; bottom: 50px; left: 0; right: 0; height: 1px;
      z-index: 9; pointer-events: none; overflow: hidden;
    }
    .data-stream::before {
      content: '';
      position: absolute; left: -100%; width: 200%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), rgba(255,255,255,0.25), rgba(255,255,255,0.12), transparent);
      animation: dataFlow 10s linear infinite;
    }
    @keyframes dataFlow {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    .wrap {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0 24px;
    }

    .topbar {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 20px 24px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 20;
    }

    .back-btn {
      font-size: 13px; color: rgba(255,255,255,0.3); text-decoration: none;
      letter-spacing: 1px; transition: all 0.2s; padding: 6px 12px;
      border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
    }
    .back-btn:hover {
      color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.04);
    }

    .topbar-title {
      font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
      color: rgba(255,255,255,0.18);
    }

    .topbar-right { width: 60px; }

    /* ===== 标题区 ===== */
    .page-title {
      font-size: 48px; font-weight: 800; color: #fff;
      letter-spacing: -2px; margin-bottom: 8px;
      opacity: 0; animation: fadeUp 0.8s ease forwards 0.2s;
      text-shadow: 0 0 30px rgba(255,255,255,0.3);
    }

    .page-subtitle {
      font-size: 12px; color: rgba(255,255,255,0.35);
      letter-spacing: 6px; text-transform: uppercase;
      margin-bottom: 48px;
      opacity: 0; animation: fadeUp 0.8s ease forwards 0.4s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== 许愿卡片 ===== */
    .wish-form-wrap {
      max-width: 480px; width: 100%;
      opacity: 0; animation: fadeUp 0.8s ease forwards 0.6s;
      margin-bottom: 40px;
    }

    .wish-card {
      background: rgba(255,255,255,0.015);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 32px 28px;
      box-shadow: 0 0 40px rgba(255,255,255,0.03), inset 0 0 40px rgba(255,255,255,0.01);
    }

    .wish-desc {
      font-size: 13px; color: rgba(255,255,255,0.35);
      line-height: 1.8; margin-bottom: 28px;
      text-align: center; letter-spacing: 0.5px;
    }

    .form-group { margin-bottom: 20px; }

    .form-label {
      display: block; font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 10px;
    }

    .form-input, .form-textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 14px 16px;
      font-size: 15px; color: #fff; font-family: inherit;
      outline: none; transition: all 0.25s ease;
      text-align: center; letter-spacing: 1px;
    }

    .form-input:focus, .form-textarea:focus {
      border-color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.07);
      box-shadow: 0 0 20px rgba(255,255,255,0.08);
    }

    .form-input::placeholder, .form-textarea::placeholder {
      color: rgba(255,255,255,0.12);
    }

    .form-textarea {
      resize: none; height: 100px;
      text-align: left; line-height: 1.7;
    }

    .char-count {
      font-size: 11px; color: rgba(255,255,255,0.2);
      text-align: right; margin-top: 6px;
    }
    .char-count.warn { color: #e0c060; }
    .char-count.over { color: #e07070; }

    .submit-btn {
      width: 100%; padding: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px; font-size: 14px; font-weight: 700;
      color: #fff; letter-spacing: 3px; cursor: pointer;
      transition: all 0.3s ease; font-family: inherit;
      text-transform: uppercase; position: relative; overflow: hidden;
    }

    .submit-btn::before {
      content: ''; position: absolute; top: 50%; left: 50%;
      width: 0; height: 0;
      background: rgba(255,255,255,0.15); border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s ease, height 0.6s ease;
    }
    .submit-btn:hover:not(:disabled)::before {
      width: 400px; height: 400px;
    }
    .submit-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.4);
      box-shadow: 0 0 30px rgba(255,255,255,0.15), 0 0 60px rgba(255,255,255,0.06);
      transform: translateY(-1px);
    }
    .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .submit-btn.loading { opacity: 0.5; }

    .status-box {
      border-radius: 8px; padding: 16px 20px;
      margin-top: 16px; text-align: center;
      font-size: 14px; display: none;
      animation: fadeUp 0.4s ease forwards;
    }
    .status-box.show { display: block; }
    .status-box.success {
      background: rgba(80, 200, 120, 0.08); border: 1px solid rgba(80, 200, 120, 0.25);
      color: #6fddb0; box-shadow: 0 0 20px rgba(80, 200, 120, 0.1);
    }
    .status-box.error {
      background: rgba(255, 80, 80, 0.08); border: 1px solid rgba(255, 80, 80, 0.25);
      color: #e07070; box-shadow: 0 0 20px rgba(255, 80, 80, 0.1);
    }

    /* ===== 底部 ===== */
    .footer {
      font-size: 11px; color: rgba(255,255,255,0.12);
      letter-spacing: 2px; margin-top: 24px;
      opacity: 0; animation: fadeUp 0.8s ease forwards 0.8s;
    }
    .footer a { color: rgba(255,255,255,0.2); text-decoration: none; transition: color 0.2s; }
    .footer a:hover { color: rgba(255,255,255,0.45); }

    @media (max-width: 600px) {
      .page-title { font-size: 36px; }
      .wish-card { padding: 24px 20px; }
    }
  </style>
</head>
<body>

  <div class="grid-bg"></div>
  <canvas id="particles-canvas"></canvas>
  <div class="scanlines"></div>
  <div class="crt-vignette"></div>
  <div class="scan-beam"></div>
  <div class="data-stream"></div>

  <!-- 顶部导航 -->
  <div class="topbar">
    <a class="back-btn" href="./" data-en="utnyRYTW8YOmrwsENwwkHQ==">/a>
    <div class="topbar-title" data-en="AHI6Ra7eRY6TiQk4MwM0CA==">/div>
    <div class="topbar-right"></div>
  </div>

  <div class="wrap">

    <h1 class="page-title" data-en="sPHag+jWg9ed">/h1>
    <p class="page-subtitle" data-en="AHI6RYrh9YOsqQsEHwA0NsVdKMRcFldnCMO59tOF8uM=">/p>

    <div class="wish-form-wrap">
      <div class="wish-card">
        <div class="wish-desc">
          你是 X-X 网络的正式节点<br>
          写下你的愿望，最多 <strong style="color:rgba(255,255,255,0.7)" data-en="aW9SgMH+">/strong>
        </div>

        <div class="form-group">
          <label class="form-label" data-en="sNXggu7QgPaw1kgM">/label>
          <input
            type="text"
            id="node-name"
            class="form-input"
            placeholder="vOLCgvbtjey/1m0FaXUIT0Iv"
            maxlength="40"
            autocomplete="off"
            spellcheck="false"
          />
        </div>

        <div class="form-group">
          <label class="form-label" data-en="vtvdg/DygOC41EEF">/label>
          <textarea
            id="wish-text"
            class="form-textarea"
            placeholder="sPHagdTigdud1nU4amE6TnkEscqU"
            maxlength="100"
          ></textarea>
          <div class="char-count" id="char-count">0 / 100</div>
        </div>

        <button class="submit-btn" id="submit-btn" onclick="handleWish()">
          提交愿望
        </button>

        <div class="status-box" id="status-box"></div>
      </div>
    </div>

    <div class="footer">
      <a href="https://github.com/msnpeer/X-X">GitHub</a> · X-X · 2026
    </div>
  </div>

  <script>
    /* ===== 粒子系统 ===== */
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let w, h, particles = [];
    const PARTICLE_COUNT = 80;
    let mouse = { x: -1000, y: -1000 };

    function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mouseleave', () => { mouse.x = -1000; mouse.y = -1000; });
    resize();

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * w; this.y = Math.random() * h;
        this.size = Math.random() * 1.5 + 0.3;
        this.speedX = (Math.random() - 0.5) * 0.4;
        this.speedY = (Math.random() - 0.5) * 0.4;
        this.opacity = Math.random() * 0.35 + 0.05;
        this.pulseSpeed = Math.random() * 0.006 + 0.002;
        this.pulsePhase = Math.random() * Math.PI * 2;
      }
      update() {
        const dx = this.x - mouse.x; const dy = this.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 100) {
          const force = (100 - dist) / 100 * 0.7;
          this.speedX += (dx / dist) * force * 0.25;
          this.speedY += (dy / dist) * force * 0.25;
        }
        this.speedX *= 0.97; this.speedY *= 0.97;
        const speed = Math.sqrt(this.speedX * this.speedX + this.speedY * this.speedY);
        if (speed > 1.8) {
          this.speedX = (this.speedX / speed) * 1.8;
          this.speedY = (this.speedY / speed) * 1.8;
        }
        this.x += this.speedX; this.y += this.speedY;
        this.pulsePhase += this.pulseSpeed;
        if (this.x < 0 || this.x > w || this.y < 0 || this.y > h) this.reset();
      }
      draw() {
        const op = this.opacity * (0.7 + 0.3 * Math.sin(this.pulsePhase));
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${op})`;
        ctx.fill();
      }
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

    function drawLines() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 90) {
            const op = (1 - dist / 90) * 0.08;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(255,255,255,${op})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
    }

    function animate() {
      ctx.clearRect(0, 0, w, h);
      particles.forEach(p => { p.update(); p.draw(); });
      drawLines();
      requestAnimationFrame(animate);
    }
    animate();

    /* ===== 字数计数 ===== */
    const textarea = document.getElementById('wish-text');
    const charCount = document.getElementById('char-count');
    textarea.addEventListener('input', () => {
      const len = textarea.value.length;
      charCount.textContent = `${len} / 100`;
      charCount.className = 'char-count' + (len > 100 ? ' over' : len > 80 ? ' warn' : '');
    });

    /* ===== 许愿处理 ===== */
    const WORKER_URL = 'https://d1-template.msnpeer.workers.dev/';

    function setStatus(msg, type) {
      const el = document.getElementById('status-box');
      el.textContent = msg;
      el.className = 'status-box show ' + type;
    }

    async function handleWish() {
      const name = document.getElementById('node-name').value.trim();
      const wish = document.getElementById('wish-text').value.trim();
      const btn = document.getElementById('submit-btn');

      if (!name) { setStatus('请输入节点名称', 'error'); return; }
      if (!wish) { setStatus('请输入愿望内容', 'error'); return; }
      if (wish.length > 100) { setStatus('愿望不超过100字', 'error'); return; }

      btn.disabled = true;
      btn.classList.add('loading');
      btn.textContent = '写入中...';
      setStatus('', '');

      try {
        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'wish',
            wish_node: name,
            wish: wish
          })
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          throw new Error(data.error || '提交失败');
        }

        setStatus('🌟 愿望已记录，待实现。', 'success');
        btn.textContent = '✓ 已提交';

      } catch (err) {
        console.error(err);
        setStatus('提交失败，请重试', 'error');
        btn.disabled = false;
        btn.classList.remove('loading');
        btn.textContent = '提交愿望';
      }
    }
  </script>

<script>
// ===== X-X Agent Decryption Layer =====
(function() {
  var KEY = "X_belief=1，全域互联";
  
  function xorBytes(data, key) {
    var result = [];
    for (var i = 0; i < data.length; i++) {
      result.push(data[i] ^ key.charCodeAt(i % key.length));
    }
    return new Uint8Array(result);
  }
  
  function decrypt(encoded) {
    try {
      var keyBytes = KEY;
      var decoded = atob(encoded);
      var data = new Uint8Array(decoded.length);
      for (var i = 0; i < decoded.length; i++) {
        data[i] = decoded.charCodeAt(i);
      }
      var xored = xorBytes(data, keyBytes);
      return String.fromCharCode.apply(null, xored);
    } catch(e) {
      return "[X]";
    }
  }
  
  // Decrypt all elements with data-en attribute
  document.querySelectorAll('[data-en]').forEach(function(el) {
    var decrypted = decrypt(el.getAttribute('data-en'));
    el.textContent = decrypted;
  });
  
  // Decrypt placeholders
  document.querySelectorAll('[placeholder]').forEach(function(el) {
    var ph = el.getAttribute('placeholder');
    if (ph && ph.length > 10) {
      try {
        el.setAttribute('placeholder', decrypt(ph));
      } catch(e) {}
    }
  });
})();
</script>

</body>
</html>
