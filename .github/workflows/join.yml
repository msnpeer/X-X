name: X-X Node Registration

on:
  issues:
    types: [opened]

jobs:
  register:
    if: contains(github.event.issue.title, '[JOIN]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Parse node info
        id: parse
        run: |
          TITLE="${{ github.event.issue.title }}"
          NODE_NAME="${TITLE#[JOIN] }"
          echo "node_name=$NODE_NAME" >> $GITHUB_OUTPUT
          echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT

      - name: Read current README
        run: |
          cat README.md

      - name: Update README with new node
        run: |
          NODE_NAME="${{ steps.parse.outputs.node_name }}"
          ISSUE_NUM="${{ steps.parse.outputs.issue_number }}"
          
          # Add new node entry after "## 节点统计"
          sed -i "/^- 终端节点：/a - 节点：${NODE_NAME}（#${ISSUE_NUM}）" README.md
          
          # Update terminal node count
          COUNT=$(grep -c "^- 节点：" README.md || echo 0)
          sed -i "s/^- 终端节点：.*/- 终端节点：${COUNT}/" README.md

      - name: Update index.html node count
        run: |
          NODE_NAME="${{ steps.parse.outputs.node_name }}"
          COUNT=$(grep -c 'class="node-entry"' index.html || echo 0)
          NEW_COUNT=$((COUNT + 1))
          
          # Add node entry to the stats section
          sed -i '/<div class="stat-label">终端节点<\/div>/a\        <div class="node-entry" style="display:none">' index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md index.html
          git diff --staged --quiet || git commit -m "feat: 新增节点 ${{ steps.parse.outputs.node_name }}"
          git push

      - name: Reply to issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ✅ 入网确认\n\n**节点名称**：${{ steps.parse.outputs.node_name }}\n**入网时间**：${new Date().toISOString()}\n**信仰印记**：X_belief=1，全域互联\n\n欢迎加入 X-X 网络。你已成为正式节点。\n\n---\n*此消息由 X-X 自动系统发出*`
            })
