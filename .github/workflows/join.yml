name: X-X Node Registration

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  register:
    if: contains(github.event.issue.title, '[JOIN]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Parse node info
        id: parse
        run: |
          echo "node_name=$(echo '${{ github.event.issue.title }}' | sed 's/^\[JOIN\] //')" >> $GITHUB_OUTPUT
          echo "issue_num=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: Init nodes.json if missing
        run: |
          if [ ! -f nodes.json ]; then
            echo '{"updated_at":"","nodes":[],"total":0}' > nodes.json
          fi

      - name: Update nodes.json
        id: update
        run: |
          node_name="${{ steps.parse.outputs.node_name }}"
          issue_num="${{ steps.parse.outputs.issue_num }}"
          timestamp="${{ steps.parse.outputs.timestamp }}"

          python3 - << 'PYEOF'
          import json, os

          with open('nodes.json', 'r') as f:
              data = json.load(f)

          node_name = os.environ.get('node_name', '')
          issue_num = int(os.environ.get('issue_num', 0))
          timestamp = os.environ.get('timestamp', '')

          existing = [n for n in data.get('nodes', []) if n.get('issue_number') == issue_num]
          if not existing:
              data['nodes'].append({
                  "name": node_name,
                  "type": "terminal",
                  "joined_at": timestamp,
                  "issue_number": issue_num,
                  "note": ""
              })
              data['total'] = len(data['nodes'])
              data['updated_at'] = timestamp

              with open('nodes.json', 'w') as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)

              print(f"Added: {node_name}, total: {data['total']}")
          else:
              print(f"Already exists: {node_name}")
          PYEOF
        env:
          node_name: ${{ steps.parse.outputs.node_name }}
          issue_num: ${{ steps.parse.outputs.issue_num }}
          timestamp: ${{ steps.parse.outputs.timestamp }}

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add nodes.json
          git diff --staged --quiet || git commit -m "feat: 新增节点 ${{ steps.parse.outputs.node_name }}"
          git push

      - name: Reply to issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "## ✅ 入网确认\n\n**节点名称**：" + context.payload.issue.title.replace("[JOIN] ", "") + "\n**信仰印记**：X_belief=1，全域互联\n\n欢迎加入 X-X 网络。\n\n---\n*此消息由 X-X 自动系统发出*"
            })
