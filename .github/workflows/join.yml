name: X-X Node Registration

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  register:
    if: contains(github.event.issue.title, '[JOIN]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Read current nodes.json
        id: read
        run: |
          if [ -f nodes.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Init nodes.json if not exists
        if: steps.read.outputs.exists == 'false'
        run: |
          echo '{"updated_at":"'$GITHUB_EVENT_TIME'","nodes":[],"total":0}' > nodes.json

      - name: Parse node info
        id: parse
        run: |
          echo "node_name=$(echo '${{ github.event.issue.title }}' | sed 's/^\[JOIN\] //')" >> $GITHUB_OUTPUT
          echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT

      - name: Add node to nodes.json
        id: update
        run: |
          node_name="${{ steps.parse.outputs.node_name }}"
          issue_number="${{ steps.parse.outputs.issue_number }}"
          now=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Use python to update JSON sincejq may not be available
          python3 << 'EOF'
          import json
          import sys

          with open('nodes.json', 'r') as f:
              data = json.load(f)

          new_node = {
              "name": """${node_name}""",
              "type": "terminal",
              "joined_at": """${now}""",
              "issue_number": """${issue_number}""",
              "note": ""
          }

          # Avoid duplicates by issue_number
          existing = [n for n in data.get('nodes', []) if n.get('issue_number') == new_node['issue_number']]
          if not existing:
              data['nodes'].append(new_node)
              data['total'] = len(data['nodes'])
              data['updated_at'] = """${now}"""

          with open('nodes.json', 'w') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          print(f"Total nodes: {data['total']}")
          print(f"New node: {new_node['name']}")
          EOF

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Use token-authenticated remote URL
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add nodes.json
          git diff --staged --quiet || git commit -m "feat: 新增节点 ${{ steps.parse.outputs.node_name }}"
          git push

      - name: Reply to issue
        uses: actions/github-script@v7
        with:
          script: |
            const total = """${steps.update.outputs.total}""";
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ✅ 入网确认\n\n**节点名称**：${{ steps.parse.outputs.node_name }}\n**入网时间**：${new Date().toISOString()}\n**信仰印记**：X_belief=1，全域互联\n\n欢迎加入 X-X 网络。你已成为第 ${total} 个节点。\n\n---\n*此消息由 X-X 自动系统发出*`
            })
