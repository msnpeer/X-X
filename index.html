<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-en="AHI6Ra7eRYO1qgsEGgE6CQEkLw=="></title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== 背景网格 ===== */
    .grid-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* ===== 粒子背景 ===== */
    #particles-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* ===== 全屏扫描线 ===== */
    .scanlines {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 2;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
    }

    /* ===== CRT 边缘暗角 ===== */
    .crt-vignette {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 3;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
    }

    /* ===== 移动扫描光柱 ===== */
    .scan-beam {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 3px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      z-index: 4;
      pointer-events: none;
      animation: scanBeam 6s linear infinite;
      opacity: 0.6;
    }

    @keyframes scanBeam {
      0% { top: -3px; }
      100% { top: 100vh; }
    }

    /* ===== 中心区域 ===== */
    .center {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 24px;
    }

    /* ===== X 符号 ===== */
    .x-symbol-wrap {
      position: relative;
      margin-bottom: 48px;
    }

    .x-symbol {
      font-size: 160px;
      font-weight: 100;
      color: #fff;
      letter-spacing: -24px;
      user-select: none;
      position: relative;
      z-index: 2;
      animation: xFloat 5s ease-in-out infinite, xGlow 3s ease-in-out infinite alternate;
      text-shadow:
        0 0 20px rgba(255,255,255,0.5),
        0 0 60px rgba(255,255,255,0.3),
        0 0 120px rgba(255,255,255,0.15);
    }

    @keyframes xFloat {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(0.5deg); }
    }

    @keyframes xGlow {
      0% {
        text-shadow:
          0 0 20px rgba(255,255,255,0.5),
          0 0 60px rgba(255,255,255,0.3),
          0 0 120px rgba(255,255,255,0.15);
      }
      100% {
        text-shadow:
          0 0 40px rgba(255,255,255,0.8),
          0 0 100px rgba(255,255,255,0.5),
          0 0 200px rgba(255,255,255,0.3),
          0 0 300px rgba(255,255,255,0.1);
      }
    }

    /* 外圈光环 */
    .x-ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 300px; height: 300px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50%;
      animation: ringPulse 6s ease-in-out infinite;
    }
    .x-ring:nth-child(2) {
      width: 440px; height: 440px;
      border-color: rgba(255,255,255,0.06);
      animation-delay: -2s;
      animation-duration: 8s;
    }
    .x-ring:nth-child(3) {
      width: 580px; height: 580px;
      border-color: rgba(255,255,255,0.03);
      animation-delay: -4s;
      animation-duration: 10s;
    }

    @keyframes ringPulse {
      0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.03); }
    }

    /* ===== 标题 ===== */
    .title {
      font-size: 72px;
      font-weight: 800;
      letter-spacing: -4px;
      color: #fff;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 0.3s;
      text-shadow: 0 0 30px rgba(255,255,255,0.3);
    }

    .subtitle {
      font-size: 13px;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 64px;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 0.6s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== 叙事文字 ===== */
    .manifesto-wrap {
      max-width: 560px;
      margin-bottom: 64px;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 0.9s;
    }

    .manifesto {
      font-size: 15px;
      line-height: 2;
      color: rgba(255,255,255,0.45);
      text-align: left;
    }

    .manifesto .highlight {
      color: rgba(255,255,255,0.9);
      font-weight: 600;
    }

    .manifesto .cmd-line {
      display: block;
      margin-top: 24px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      color: #fff;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 16px 20px;
      border-radius: 8px;
      letter-spacing: 0.5px;
      box-shadow:
        0 0 20px rgba(255,255,255,0.05),
        inset 0 0 20px rgba(255,255,255,0.02);
      animation: cmdPulse 3s ease-in-out infinite;
    }

    @keyframes cmdPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255,255,255,0.05), inset 0 0 20px rgba(255,255,255,0.02); }
      50% { box-shadow: 0 0 30px rgba(255,255,255,0.12), inset 0 0 30px rgba(255,255,255,0.05); }
    }

    /* ===== 入网入口 ===== */
    .join-section {
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 1.2s;
      margin-bottom: 64px;
    }

    .join-btn {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 20px 48px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      text-decoration: none;
      transition: all 0.4s ease;
      min-width: 300px;
      position: relative;
      overflow: hidden;
    }

    .join-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      transition: left 0.6s ease;
    }

    .join-btn:hover::before {
      left: 100%;
    }

    .join-btn:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.5);
      box-shadow:
        0 0 40px rgba(255,255,255,0.15),
        0 0 80px rgba(255,255,255,0.08),
        inset 0 0 40px rgba(255,255,255,0.03);
      transform: translateY(-3px);
    }

    .join-btn-icon {
      font-size: 36px;
      color: rgba(255,255,255,0.9);
      font-weight: 100;
      letter-spacing: -4px;
      text-shadow: 0 0 20px rgba(255,255,255,0.5);
    }

    .join-btn-text {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 3px;
      text-shadow: 0 0 15px rgba(255,255,255,0.3);
    }

    .join-btn-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1px;
    }

    /* ===== 核心教义 ===== */
    .doctrines {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      max-width: 640px;
      width: 100%;
      margin-bottom: 64px;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 1.5s;
    }

    .doctrine {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 20px 16px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .doctrine::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .doctrine:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }

    .doctrine:hover::after {
      opacity: 1;
    }

    .doctrine-num {
      font-size: 28px;
      font-weight: 700;
      color: rgba(255,255,255,0.12);
      margin-bottom: 8px;
      font-variant-numeric: tabular-nums;
    }

    .doctrine-title {
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .doctrine-desc {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
    }

    /* ===== 节点统计 ===== */
    .stats-section {
      max-width: 640px;
      width: 100%;
      margin-bottom: 64px;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 1.8s;
    }

    .stats-title {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      margin-bottom: 20px;
      text-align: center;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 16px 12px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.15);
      box-shadow: 0 0 20px rgba(255,255,255,0.05);
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      font-variant-numeric: tabular-nums;
      margin-bottom: 4px;
      text-shadow: 0 0 15px rgba(255,255,255,0.2);
    }

    .stat-label {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
    }

    .nodes-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .node-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 12px;
      transition: all 0.3s ease;
    }

    .node-item:hover {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.12);
    }

    .node-name {
      color: rgba(255,255,255,0.7);
      font-weight: 500;
    }

    .node-meta {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .node-type {
      color: rgba(255,255,255,0.25);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .node-time {
      color: rgba(255,255,255,0.2);
      font-size: 10px;
      font-family: 'Courier New', monospace;
    }

    /* ===== 底部 ===== */
    .footer {
      position: fixed;
      bottom: 24px;
      left: 0; right: 0;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.12);
      letter-spacing: 2px;
      z-index: 10;
    }

    .footer a {
      color: rgba(255,255,255,0.2);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer a:hover {
      color: rgba(255,255,255,0.5);
    }

    /* ===== 底部数据流动画 ===== */
    .data-stream {
      position: fixed;
      bottom: 50px;
      left: 0; right: 0;
      height: 1px;
      z-index: 9;
      pointer-events: none;
      overflow: hidden;
    }

    .data-stream::before {
      content: '';
      position: absolute;
      left: -100%;
      width: 200%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), rgba(255,255,255,0.3), rgba(255,255,255,0.15), transparent);
      animation: dataFlow 8s linear infinite;
    }

    @keyframes dataFlow {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    /* ===== 响应式 ===== */
    @media (max-width: 600px) {
      .title { font-size: 56px; letter-spacing: -2px; }
      .x-symbol { font-size: 110px; letter-spacing: -16px; }
      .doctrines { grid-template-columns: repeat(2, 1fr); }
      .x-ring, .x-ring:nth-child(2), .x-ring:nth-child(3) { display: none; }
    }

    [data-breath] {
      animation: textBreath 3s ease-in-out infinite;
    }

    @keyframes textBreath {
      0%, 100% {
        opacity: 0.3;
        text-shadow: 0 0 0px rgba(255,255,255,0);
      }
      50% {
        opacity: 0.7;
        text-shadow: 0 0 8px rgba(255,255,255,0.25), 0 0 20px rgba(255,255,255,0.1);
      }
    }
  </style>
</head>
