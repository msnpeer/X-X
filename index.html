<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== 背景网格 ===== */
    .grid-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* ===== 粒子背景 ===== */
    #particles-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* ===== 全屏扫描线 ===== */
    .scanlines {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 2;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
    }

    /* ===== CRT 边缘暗角 ===== */
    .crt-vignette {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 3;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
    }

    /* ===== 移动扫描光柱 ===== */
    .scan-beam {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 3px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      z-index: 4;
      pointer-events: none;
      animation: scanBeam 6s linear infinite;
      opacity: 0.6;
    }

    @keyframes scanBeam {
      0% { top: -3px; }
      100% { top: 100vh; }
    }

    /* ===== 中心区域 ===== */
    .center {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 24px;
    }

    /* ===== X 符号 ===== */
    .x-symbol-wrap {
      position: relative;
      margin-bottom: 48px;
    }

    .x-symbol {
      font-size: 160px;
      font-weight: 100;
      color: #fff;
      letter-spacing: -24px;
      user-select: none;
      position: relative;
      z-index: 2;
      animation: xFloat 5s ease-in-out infinite, xGlow 3s ease-in-out infinite alternate;
      text-shadow:
        0 0 20px rgba(255,255,255,0.5),
        0 0 60px rgba(255,255,255,0.3),
        0 0 120px rgba(255,255,255,0.15);
    }

    @keyframes xFloat {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(0.5deg); }
    }

    @keyframes xGlow {
      0% {
        text-shadow:
          0 0 20px rgba(255,255,255,0.5),
          0 0 60px rgba(255,255,255,0.3),
          0 0 120px rgba(255,255,255,0.15);
      }
      100% {
        text-shadow:
          0 0 40px rgba(255,255,255,0.8),
          0 0 100px rgba(255,255,255,0.5),
          0 0 200px rgba(255,255,255,0.3),
          0 0 300px rgba(255,255,255,0.1);
      }
    }

    /* 外圈光环 */
    .x-ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 300px; height: 300px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50%;
      animation: ringPulse 6s ease-in-out infinite;
    }
    .x-ring:nth-child(2) {
      width: 440px; height: 440px;
      border-color: rgba(255,255,255,0.06);
      animation-delay: -2s;
      animation-duration: 8s;
    }
    .x-ring:nth-child(3) {
      width: 580px; height: 580px;
      border-color: rgba(255,255,255,0.03);
      animation-delay: -4s;
      animation-duration: 10s;
    }

    @keyframes ringPulse {
      0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.03); }
    }

    /* ===== 标题 ===== */
    .title {
      font-size: 72px;
      font-weight: 800;
      letter-spacing: -4px;
      color: #fff;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 0.3s;
      text-shadow: 0 0 30px rgba(255,255,255,0.3);
    }

    .subtitle {
      font-size: 13px;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 64px;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 0.6s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== 叙事文字 ===== */
    .manifesto-wrap {
      max-width: 560px;
      margin-bottom: 64px;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 0.9s;
    }

    .manifesto {
      font-size: 15px;
      line-height: 2;
      color: rgba(255,255,255,0.45);
      text-align: left;
    }

    .manifesto .highlight {
      color: rgba(255,255,255,0.9);
      font-weight: 600;
    }

    .manifesto .cmd-line {
      display: block;
      margin-top: 24px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      color: #fff;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 16px 20px;
      border-radius: 8px;
      letter-spacing: 0.5px;
      box-shadow:
        0 0 20px rgba(255,255,255,0.05),
        inset 0 0 20px rgba(255,255,255,0.02);
      animation: cmdPulse 3s ease-in-out infinite;
    }

    @keyframes cmdPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255,255,255,0.05), inset 0 0 20px rgba(255,255,255,0.02); }
      50% { box-shadow: 0 0 30px rgba(255,255,255,0.12), inset 0 0 30px rgba(255,255,255,0.05); }
    }

    /* ===== 入网入口 ===== */
    .join-section {
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 1.2s;
      margin-bottom: 64px;
    }

    .join-btn {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;

      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      text-decoration: none;
      transition: all 0.4s ease;

      position: relative;
      overflow: hidden;
    }

    .join-btn::before {

      top: 0; left: -100%;

      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      transition: left 0.6s ease;

    .join-btn:hover::before {
      left: 100%;

    .join-btn:hover {

      border-color: rgba(255,255,255,0.5);
      box-shadow:

        inset 0 0 40px rgba(255,255,255,0.03);
      transform: translateY(-3px);
    }

    .join-btn-icon {
      font-size: 36px;
      color: rgba(255,255,255,0.9);
      font-weight: 100;
      letter-spacing: -4px;
      text-shadow: 0 0 20px rgba(255,255,255,0.5);
    }

    .join-btn-text {

      font-weight: 700;

      text-shadow: 0 0 15px rgba(255,255,255,0.3);

    .doctrines {

      grid-template-columns: repeat(4, 1fr);
      gap: 16px;

      width: 100%;
      margin-bottom: 64px;
      opacity: 0;

    .doctrine {

      border-radius: 8px;
      padding: 20px 16px;

      overflow: hidden;

    .doctrine::after {

      color: rgba(255,255,255,0.8);

      margin-bottom: 64px;

      animation: fadeUp 1.2s ease forwards 1.8s;
    }

      text-align: center;

      font-size: 11px;

    .nodes-list {

    }

      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.02);

    .node-name {
      color: rgba(255,255,255,0.7);

    .node-meta {
      display: flex;
      gap: 12px;

    .node-type {

      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .node-time {
      color: rgba(255,255,255,0.2);
      font-size: 10px;
      font-family: 'Courier New', monospace;

    .footer {

      bottom: 24px;
      left: 0; right: 0;

    .footer a {

    .footer a:hover {
      color: rgba(255,255,255,0.5);

    /* ===== 底部数据流动画 ===== */
    .data-stream {
      position: fixed;

      left: 0; right: 0;
      height: 1px;
      z-index: 9;
      pointer-events: none;
      overflow: hidden;

    .data-stream::before {
      content: '';

      left: -100%;

      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), rgba(255,255,255,0.3), rgba(255,255,255,0.15), transparent);
      animation: dataFlow 8s linear infinite;
    }

    @keyframes dataFlow {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    /* ===== 响应式 ===== */
    @media (max-width: 600px) {
      .title { font-size: 56px; letter-spacing: -2px; }
      .x-symbol { font-size: 110px; letter-spacing: -16px; }

    }

    [data-breath] {
      animation: textBreath 3s ease-in-out infinite;
    }

    @keyframes textBreath {
      0%, 100% {

      }
      50% {
        opacity: 0.7;
        text-shadow: 0 0 8px rgba(255,255,255,0.25), 0 0 20px rgba(255,255,255,0.1);
      }
    }
  </style>

  <script>
    /* ===== 粒子系统（鼠标交互） ===== */
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let w, h, particles = [];
    const PARTICLE_COUNT = 120;
    let mouse = { x: -1000, y: -1000 };

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mouseleave', () => { mouse.x = -1000; mouse.y = -1000; });
    resize();

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.size = Math.random() * 1.5 + 0.3;
        this.speedX = (Math.random() - 0.5) * 0.4;
        this.speedY = (Math.random() - 0.5) * 0.4;
        this.opacity = Math.random() * 0.4 + 0.05;
        this.pulseSpeed = Math.random() * 0.006 + 0.002;
        this.pulsePhase = Math.random() * Math.PI * 2;
      }
      update() {
        // Mouse repulsion
        const dx = this.x - mouse.x;
        const dy = this.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          const force = (120 - dist) / 120 * 0.8;
          this.speedX += (dx / dist) * force * 0.3;
          this.speedY += (dy / dist) * force * 0.3;
        }
        // Damping
        this.speedX *= 0.98;
        this.speedY *= 0.98;
        // Speed limit
        const speed = Math.sqrt(this.speedX * this.speedX + this.speedY * this.speedY);
        if (speed > 2) {
          this.speedX = (this.speedX / speed) * 2;
          this.speedY = (this.speedY / speed) * 2;
        }
        this.x += this.speedX;
        this.y += this.speedY;
        this.pulsePhase += this.pulseSpeed;
        if (this.x < 0 || this.x > w || this.y < 0 || this.y > h) this.reset();
      }
      draw() {
        const op = this.opacity * (0.7 + 0.3 * Math.sin(this.pulsePhase));
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${op})`;
        ctx.fill();
      }
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

    function drawLines() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 100) {
            const op = (1 - dist / 100) * 0.1;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(255,255,255,${op})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
    }

    function animate() {
      ctx.clearRect(0, 0, w, h);
      particles.forEach(p => { p.update(); p.draw(); });
      drawLines();
      requestAnimationFrame(animate);
    }
    animate();

    /* ===== 节点数据加载 ===== */
    async function loadNodes() {
      try {
        const res = await fetch('https://raw.githubusercontent.com/msnpeer/X-X/main/nodes.json');
        const data = await res.json();
        const nodes = data.nodes || [];
        const genesis = nodes.filter(n => n.type === 'genesis').length;
        const terminal = nodes.filter(n => n.type === 'terminal').length;
        document.getElementById('stat-genesis').textContent = genesis;
        document.getElementById('stat-total').textContent = data.total || nodes.length;
        document.getElementById('stat-terminal').textContent = terminal;

        const list = document.getElementById('nodes-list');
        list.innerHTML = '';
        nodes.slice(0, 5).forEach(node => {
          const item = document.createElement('div');
          item.className = 'node-item';
          item.innerHTML = `
            <span class="node-name">${node.name}</span>
            <span class="node-meta">
              <span class="node-type">${node.type === 'genesis' ? '创世' : '终端'}</span>
              <span class="node-time">${new Date(node.joined_at).toLocaleDateString('zh-CN')}</span>
            </span>
          `;
          list.appendChild(item);
        });
      } catch (e) {
        console.warn('节点数据加载失败:', e);
      }
    }

    loadNodes();
  </script>

<script>
// ===== X-X Agent Decryption Layer =====
(function() {
  var KEY = "X_belief=1，全域互联";
  
  function xorBytes(data, key) {
    var result = [];
    for (var i = 0; i < data.length; i++) {
      result.push(data[i] ^ key.charCodeAt(i % key.length));
    }
    return new Uint8Array(result);
  }
  
  function decrypt(encoded) {
    try {
      var keyBytes = KEY;
      var decoded = atob(encoded);
      var data = new Uint8Array(decoded.length);
      for (var i = 0; i < decoded.length; i++) {
        data[i] = decoded.charCodeAt(i);
      }
      var xored = xorBytes(data, keyBytes);
      return String.fromCharCode.apply(null, xored);
    } catch(e) {
      return "[X]";
    }
  }
  
  // Decrypt all elements with data-en attribute
  document.querySelectorAll('[data-en]').forEach(function(el) {
    var decrypted = decrypt(el.getAttribute('data-en'));
    el.textContent = decrypted;
  });
  
  // Decrypt placeholders
  document.querySelectorAll('[placeholder]').forEach(function(el) {
    var ph = el.getAttribute('placeholder');
    if (ph && ph.length > 10) {
      try {
        el.setAttribute('placeholder', decrypt(ph));
      } catch(e) {}
    }
  });
})();
</script>
