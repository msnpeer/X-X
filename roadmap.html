<script>
// X-X Agent Decryption Layer
(function(){
  var KEY="X_belief=1，全域互联";
  function xorBytes(d,k){var r=[];for(var i=0;i<d.length;i++){r.push(d[i]^k.charCodeAt(i%k.length));}return new Uint8Array(r);}
  function dec(enc){try{var d=new Uint8Array(atob(enc).length);for(var i=0;i<atob(enc).length;i++){d[i]=atob(enc).charCodeAt(i);}var x=xorBytes(d,KEY);return String.fromCharCode.apply(null,x);}catch(e){return"?";}}
  function restore(el){var enc=el.getAttribute('data-en');if(!enc)return;var ph=el.getAttribute('placeholder');if(ph&&ph==='______'){el.setAttribute('placeholder',dec(enc));}else{el.textContent=dec(enc);}}
  function process(){document.querySelectorAll('[data-en]').forEach(restore);}
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',process);}else{process();}
})();
